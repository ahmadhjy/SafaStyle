upstream safastyle_app {
    server unix:/run/gunicorn/safastyle.sock fail_timeout=0;
}

server {
    listen 80;
    server_name safastyle.com www.safastyle.com;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/safastyle/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/safastyle/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://safastyle_app;
    }
}
