{% extends "base.html" %}

{% block title %}Password updated — {{ site.store_name }}{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Password updated</h1>
  <p>Your password has been changed. You can sign in with your new password now.</p>
  <a class="btn btn-gold btn-block" href="{% url 'accounts:login' %}">Sign in</a>
</div>
{% endblock %}
